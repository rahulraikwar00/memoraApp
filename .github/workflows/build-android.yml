name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        type: choice
        options:
          - development
          - production
          - both
      clean_install:
        description: "Clean install packages"
        required: true
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install dependencies
        run: npm ci

      - name: Clean install (optional)
        if: inputs.clean_install == true
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Build Development APK
        if: inputs.build_type == 'development' || inputs.build_type == 'both'
        run: |
          cd android && ./gradlew assembleDebug
          cd ..

      - name: Build Production APK (Installable)
        if: inputs.build_type == 'production' || inputs.build_type == 'both'
        run: |
          cd android && ./gradlew assembleRelease
          cd ..

          # Sign the APK with debug keystore for installation
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore ~/.android/debug.keystore \
            -storepass android -keypass android \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            androiddebugkey

          # Zipalign the APK
          $ANDROID_HOME/build-tools/*/zipalign -v 4 \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            android/app/build/outputs/apk/release/app-release-signed.apk

      - name: Get version name
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

      - name: Upload Development APK
        if: inputs.build_type == 'development' || inputs.build_type == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-v${{ steps.version.outputs.version }}-${{ steps.version.outputs.timestamp }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          compression-level: 0

      - name: Upload Production APK (Installable)
        if: inputs.build_type == 'production' || inputs.build_type == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-installable-v${{ steps.version.outputs.version }}-${{ steps.version.outputs.timestamp }}
          path: android/app/build/outputs/apk/release/app-release-signed.apk
          retention-days: 30
          compression-level: 0

      - name: Upload ProGuard Mapping (Production)
        if: inputs.build_type == 'production' || inputs.build_type == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: mapping-v${{ steps.version.outputs.version }}-${{ steps.version.outputs.timestamp }}
          path: android/app/build/outputs/mapping/release/mapping.txt
          retention-days: 90
          if-no-files-found: ignore

      - name: Create Build Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | ${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Type** | ${{ inputs.build_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp** | ${{ steps.version.outputs.timestamp }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Clean Install** | ${{ inputs.clean_install }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ inputs.build_type }}" = "development" ] || [ "${{ inputs.build_type }}" = "both" ]; then
            echo "### ✅ Development APK" >> $GITHUB_STEP_SUMMARY
            echo "- Debug build for testing" >> $GITHUB_STEP_SUMMARY
            echo "- **Ready to install** on devices" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ inputs.build_type }}" = "production" ] || [ "${{ inputs.build_type }}" = "both" ]; then
            echo "### ✅ Production APK" >> $GITHUB_STEP_SUMMARY
            echo "- **Signed APK** - ready to install!" >> $GITHUB_STEP_SUMMARY
            echo "- Signed with debug keystore for testing" >> $GITHUB_STEP_SUMMARY
            echo "- **Note:** For Play Store, use proper signing keys" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "### 📥 Download Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "Scroll down to the **Artifacts** section below to download the APK files" >> $GITHUB_STEP_SUMMARY
